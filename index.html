<!DOCTYPE HTML>
<head>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header><h1>Lego Minecraft Block Guide</h1></header>
 <script>
   fetch('/List.htm')
  .then(response => {
    if (!response.ok) {
      throw new Error(`HTTP error! Status: ${response.status}`);
    }
    return response.text();
  })
  .then(data => {
    console.log(data);

    // Example: put the file contents into an element
    document.getElementById('Block-list').innerHTML = data;
  })
  .catch(error => {
    console.error('Failed to fetch List.htm:', error);
  });
 </script>
  <section id="Block-list">
  </section>
</body>
