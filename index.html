<!DOCTYPE html>
<html>

<head>

    <link rel="stylesheet" href="styles.css">

</head>

<body>

<header>
    <h1>Lego Minecraft Block Guide</h1>
</header>

<div id="loading">
    <img src="/loading.gif">
</div>

<div id="block-list"></div>

<script>

async function loadBlocks() {

    const loading =
        document.getElementById("loading");

    const blockList =
        document.getElementById("block-list");

    // Load block database
    const blockResponse =
        await fetch("/Block-Name.json");

    const blockData =
        await blockResponse.text();

    const blockLines =
        blockData
            .trim()
            .split("\n")
            .slice(1);

    // Load valid block IDs
    const validResponse =
        await fetch("/ValidBlocks.json");

    const validData =
        await validResponse.text();

    const validIds =
        validData
            .trim()
            .split("\n")
            .map(id => id.trim());

    // Fast lookup set
    const validSet =
        new Set(validIds);

    // Process blocks
    for (const line of blockLines) {

        const [name, id] =
            line.split("\t");

        const cleanName =
            name.trim();

        const cleanId =
            id.trim();

        // Skip invalid blocks
        if (!validSet.has(cleanId))
            continue;

        // Create link
        const link =
            document.createElement("a");

        link.href =
`https://lego-minecraft-block-guide.vercel.app/Block.html?id=${cleanId}`;

        link.textContent =
            cleanName;

        // Create container
        const div =
    document.createElement("div");

        div.classList.add("btn");

        div.appendChild(link);

        blockList.appendChild(div);
    }

    // Hide loading gif
    loading.style.display =
        "none";
}

// Run script
loadBlocks();

</script>

</body>
</html>
