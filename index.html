<!DOCTYPE HTML>
<html>

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Lego Minecraft Block Guide</title>

    <link rel="stylesheet"
          href="styles.css">

</head>

<body>

<header>

    <h1>Lego Minecraft Block Guide</h1>

</header>

<h1 id="title"></h1>

<div id="loading">

    <img src="/loading.gif"
         alt="Loading">

</div>

<div id="block-list"></div>

<script>

async function loadBlocks() {

    const loading =
        document.getElementById("loading");

    const blockList =
        document.getElementById("block-list");

    try {

        // Load block database
        const blockResponse =
            await fetch("/Block-Name.json");

        const blockData =
            await blockResponse.text();

        const blockLines =
            blockData
                .trim()
                .split("\n")
                .slice(1);

        // Load valid block IDs
        const validResponse =
            await fetch("/ValidBlocks.json");

        const validData =
            await validResponse.text();

        const validIds =
            validData
                .trim()
                .split("\n")
                .map(id => id.trim());

        // Fast lookup
        const validSet =
            new Set(validIds);

        // Generate buttons
        for (const line of blockLines) {

            const [name, id] =
                line.split("\t");

            if (!name || !id)
                continue;

            const cleanName =
                name.trim();

            const cleanId =
                id.trim();

            // Skip invalid blocks
            if (!validSet.has(cleanId))
                continue;

            // Create button
            const link =
                document.createElement("a");

            link.href =
`https://lego-minecraft-block-guide.vercel.app/Block.html?id=${cleanId}`;

            link.textContent =
                cleanName;

            link.classList.add("btn");

            blockList.appendChild(link);
        }

    } catch (error) {

        console.error(error);

        blockList.innerHTML =
            "<p>Failed to load blocks.</p>";
    }

    // Hide loading icon
    loading.style.display =
        "none";
}

// Run script
loadBlocks();

</script>

</body>
</html>
