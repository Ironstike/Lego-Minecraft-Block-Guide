<!DOCTYPE HTML>
<head>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header><h1>Lego Minecraft Block Guide</h1></header>
<script>

async function loadBlocks() {

    const loading =
        document.getElementById("loading");

    const blockList =
        document.getElementById("block-list");

    // Load block database
    const blockResponse =
        await fetch("/Block-Name.json");

    const blockData =
        await blockResponse.text();

    const blockLines =
        blockData.trim()
            .split("\n")
            .slice(1);

    // Load image list
    const imageResponse =
        await fetch("/Image-List.json");

    const imageFiles =
        await imageResponse.json();

    // Create a fast lookup set
    const imageSet =
        new Set();

    imageFiles.forEach(file => {

        const id =
            file.split(".")[0];

        imageSet.add(id);
    });

    // Process blocks
    for (const line of blockLines) {

        const [name, id] =
            line.split("\t");

        const cleanName =
            name.trim();

        const cleanId =
            id.trim();

        // Skip if image missing
        if (!imageSet.has(cleanId))
            continue;

        // Create link
        const link =
            document.createElement("a");

        link.href =
`https://lego-minecraft-block-guide.vercel.app/Block.html?id=${cleanId}`;

        link.textContent =
            cleanName;

        // Create container
        const div =
            document.createElement("div");

        div.appendChild(link);

        blockList.appendChild(div);
    }

    // Hide loading gif
    loading.style.display =
        "none";
}

loadBlocks();

</script>
  
<div id="loading">
    <img src="/loading.gif">
</div>

<div id="block-list"></div>
</body>
</html>
